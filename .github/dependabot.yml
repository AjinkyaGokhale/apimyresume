version: 2
updates:
  - package-ecosystem: npm
    directory: /packages/api
    schedule:
      interval: weekly
    groups:
      api-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /packages/dashboard
    schedule:
      interval: weekly
    groups:
      dashboard-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
